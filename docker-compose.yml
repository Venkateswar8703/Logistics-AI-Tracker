version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logistics-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./backend/app/data:/app/app/data
    networks:
      - logistics-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logistics-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - logistics-network
    restart: unless-stopped

networks:
  logistics-network:
    driver: bridge
