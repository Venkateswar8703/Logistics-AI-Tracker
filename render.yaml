# Render.com Blueprint — one-click deployment
# https://render.com/docs/blueprint-spec

services:
  # ── FastAPI Backend ────────────────────────────────────────────
  - type: web
    name: logistics-ai-tracker-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "false"
      - key: OPENAI_API_KEY
        sync: false   # prompt user to set manually
    healthCheckPath: /api/health
    autoDeploy: true
